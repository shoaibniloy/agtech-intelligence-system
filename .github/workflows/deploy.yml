name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ "main" ]
  # Allows the backend sweep workflow to trigger this deployment automatically
  workflow_run:
    workflows: ["AgTech Intelligence Core Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4.2.2

      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. Install Project Dependencies
        run: npm install

      - name: 4. Build Vite Application
        run: npm run build

      - name: 5. Upload Distribution Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 6. Publish to GitHub Pages Live Domain
        id: deployment
        uses: actions/deploy-pages@v4
